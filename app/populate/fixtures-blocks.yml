    Size: "1-Col"
    BlockImage: =>SilverStripe\Assets\Image.img_meditation_corner
  home_r4c2c3:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 11
    Title: "Image Block: Row 4 Columns 3 and 4"
    Size: "2-Col"
    BlockImage: =>SilverStripe\Assets\Image.img_youth_outreach

App\Blocks\RecentEventsBlock:
  home_recent_events:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 12
    Title: "Recent Events Block"
    BGColour: "Light Grey"
    ButtonText: "All events"
    LinkedPage: =>App\PageTypes\EventsListingPage.events

App\Blocks\TextImageBlock:
  txt_img_1:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.contentPageArea
    Sort: 13
    Title: "About our Dōjō"
    ShowTitle: 1
    SubTitle: "Yesterday and Today"
    BGColour: "Light Grey"
    BlockText: "<p>Our organization was founded in our original host country several decades ago with the support of local mentors and industry leaders, becoming one of the first independent groups in the region to be established by an international expatriate. Our group originally functioned as a weekend morning workshop in which we collaborated on material that was being developed by leading experts that week. In addition to our own core membership (comprised of locals and foreign professionals) we were frequently fortunate to have senior practitioners and guest instructors assist with our regular sessions.</p>"
    ImageAlignment: "Right"
    Image1: =>SilverStripe\Assets\Image.img_tournament_action
  txt_img_2:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.contentPageArea
    Sort: 14
    Title: "About our Martial Art"
    ShowTitle: 1
    SubTitle: "History and Tradition"
    BGColour: "Light Grey"
    BlockText: "<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat dolor sit. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur, excepteur sint occaecat cupidatat non proident, sunt in. Culpa qui officia deserunt mollit anim id est laborum (sed ut perspiciatis unde omnis iste) natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam eaque ipsa quae ab.</p>"
    ImageAlignment: "Left"
    Image1: =>SilverStripe\Assets\Image.img_meditation_corner

