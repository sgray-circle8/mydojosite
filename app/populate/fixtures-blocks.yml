---
App\Blocks\CTABlockFullWidth:
  cta_home:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 1
    Title: "Full Width CTA Block"
    CTASummary: "<p>This <span><strong>Full Width Call to Action Block</strong> has a <strong>Title</strong>, a <strong>Summary</strong> with WYSIWYG text, customisable button text, and the ability to select which page the link goes to in the CMS. The summary and button stack vertically on mobile, and there is a subtle on-hover colour change on the button. But that's not all...</span></p>"
    CTAButtonText: "Keep Going - Take the next step"
    CTAButtonPage: =>App\PageTypes\ContactPage.contact

App\Blocks\TextBlock:
  text_home:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 2
    Title: "This Text Block"
    BGColour: "Light Grey"
    BlockSummary: "could be used to briefly introduce your Dōjō. Text Blocks can have an optional Subtitle, and there are 3 background colours to choose from. The text and link for the optional button are customisable."
    ButtonText: "Learn more"
    LinkedPage: =>App\PageTypes\ContentPage.about
  text_home-2:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 4
    Title: "Another Text Block"
    SubTitle: "... but with a SubTitle!"
    BGColour: "Red"
    BlockSummary: "This text block doesn't use the optional button because the red background makes it cool enough just as it is. A class schedule could go here, for example."
  text_home-3:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 6
    Title: "Text Block 3"
    BGColour: "Light Grey"
    BlockSummary: "This block is positioned after a two-column image block. Image blocks can be either 1 or 2 columns wide. The blocks all stack vertically on mobile."
    ButtonText: "Jump in"
    LinkedPage: =>App\PageTypes\ContentPage.training
  text_home-4:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 7
    Title: "RANDOM!"
    BGColour: "Red"
    UseRandomQuote: 1
  text_home-5:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 8
    Title: "Random Quotes"
    SubTitle: "Available on text blocks"
    BGColour: "Light Grey"
    BlockSummary: "In addition to all the other cool stuff, text blocks also have a CMS checkbox that converts them into a random quote generator."
  text_home-6:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 10
    Title: "Next Text Block"
    BGColour: "Light Grey"
    BlockSummary: "There's a good back story to all good text blocks and if you look hard enough here, you probably won't find the one belonging to this block. Sorry. (Check out the cool 2-column image block right after this!)"

App\Blocks\ImageBlock:
  home_r1c2:
    ParentID: =>DNADesign\Elemental\Models\ElementalArea.homeArea
    Sort: 3
    Title: "Image Block: Row 1 Column 2"
    Size: "1-Col"
    BlockImage: =>SilverStripe\Assets\Image.img_dojo_entrance
  home_r2c1c2:
